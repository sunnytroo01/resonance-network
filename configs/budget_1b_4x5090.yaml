# Resonance Network - 1.3B - Optimized for 4x RTX 5090 + network volume
# Budget: $72 → ~20 hours total (~18 hrs pretrain + ~2 hrs SFT)
# VRAM: 32GB per GPU, 4 GPUs with FSDP
# Safe: checkpoints on network volume, nothing lost if pod dies

model:
  dim: 2048
  n_layers: 24
  num_heads: 16
  max_seq_len: 2048
  coupling_rank: 512
  num_stored_patterns: 1024
  hopfield_steps: 1
  mag_expansion: 4
  dropout: 0.05
  dt: 0.1
  use_sparsemax: true
  stability_weight: 0.001

training:
  batch_size: 12
  gradient_accumulation: 8
  learning_rate: 3e-4
  min_lr: 3e-5
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 500
  max_steps: 12000
  lr_scheduler: cosine
  seq_len: 2048
  amp_dtype: bfloat16

data:
  dataset: slimpajama
  tokenizer: gpt2
  num_workers: 8
