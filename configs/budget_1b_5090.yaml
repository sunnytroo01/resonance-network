# Resonance Network - 1.3B - Optimized for 8x RTX 5090 / $72 budget
# Runtime: ~9 hours pretrain + ~1 hour SFT
# Expected: ~7-10B tokens processed
# VRAM: 32GB per GPU — batch_size tuned to fit
#
# Usage:
#   torchrun --nproc_per_node=8 train.py \
#     --config configs/budget_1b_5090.yaml \
#     --data-dir /workspace/data/pretrain \
#     --output-dir /workspace/checkpoints/pretrain \
#     --save-every 200 --keep-checkpoints 3 --wandb

model:
  dim: 2048
  n_layers: 24
  num_heads: 16
  max_seq_len: 2048
  coupling_rank: 512
  num_stored_patterns: 1024
  hopfield_steps: 1
  mag_expansion: 4
  dropout: 0.05
  dt: 0.1
  use_sparsemax: true
  stability_weight: 0.001

training:
  batch_size: 16
  gradient_accumulation: 8
  learning_rate: 3e-4
  min_lr: 3e-5
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 300
  max_steps: 7000
  lr_scheduler: cosine
  seq_len: 2048
  amp_dtype: bfloat16

data:
  dataset: slimpajama
  tokenizer: gpt2
  num_workers: 8
