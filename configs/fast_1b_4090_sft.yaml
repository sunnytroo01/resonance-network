# 1.3B SFT on 4x RTX 4090

model:
  dim: 2048
  n_layers: 24
  num_heads: 16
  max_seq_len: 2048
  coupling_rank: 512
  num_stored_patterns: 1024
  hopfield_steps: 1
  mag_expansion: 4
  dropout: 0.0
  dt: 0.1
  use_sparsemax: true
  stability_weight: 0.0

training:
  batch_size: 4
  gradient_accumulation: 8
  learning_rate: 2e-5
  min_lr: 2e-6
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 100
  max_steps: 1500
  lr_scheduler: cosine
  seq_len: 2048
  amp_dtype: bfloat16

data:
  dataset: sft
  tokenizer: gpt2
  num_workers: 8
