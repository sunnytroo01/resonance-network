# 1.3B on 1x NVIDIA B200 — single GPU, no FSDP
# VRAM: fits comfortably in 80GB+
# If you have 192GB VRAM, you can increase batch_size to 8

model:
  dim: 2048
  n_layers: 24
  num_heads: 16
  max_seq_len: 2048
  coupling_rank: 512
  num_stored_patterns: 1024
  hopfield_steps: 1
  mag_expansion: 4
  dropout: 0.05
  dt: 0.1
  use_sparsemax: true
  stability_weight: 0.001

training:
  batch_size: 3
  gradient_accumulation: 8
  learning_rate: 3e-4
  min_lr: 3e-5
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 500
  max_steps: 40000
  lr_scheduler: cosine
  seq_len: 2048
  amp_dtype: bfloat16

data:
  dataset: slimpajama
  tokenizer: gpt2
  num_workers: 4
