# Resonance Network - Giant (70B params)
# Competitive with Llama-70B, needs 64-128 B200s
# Uses FSDP + tensor parallelism

model:
  dim: 8192
  n_layers: 80
  num_heads: 64
  max_seq_len: 8192
  coupling_rank: 2048
  num_stored_patterns: 4096
  hopfield_steps: 1
  mag_expansion: 4
  dropout: 0.0
  dt: 0.05
  use_sparsemax: false
  stability_weight: 0.0001

training:
  batch_size: 2
  gradient_accumulation: 64
  learning_rate: 1e-4
  min_lr: 1e-5
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 4000
  max_steps: 2000000
  lr_scheduler: cosine
  seq_len: 8192
  amp_dtype: bfloat16
  tensor_parallel: 8      # split model across 8 GPUs per node

data:
  dataset: slimpajama
  tokenizer: gpt2
  num_workers: 16
