# Resonance Network - Large (1.3B params)
# Good for: serious language model, needs 4-8 B200s
# VRAM: ~80GB per GPU with FSDP

model:
  dim: 2048
  n_layers: 24
  num_heads: 16
  max_seq_len: 4096
  coupling_rank: 512
  num_stored_patterns: 1024
  hopfield_steps: 1
  mag_expansion: 4
  dropout: 0.05
  dt: 0.1
  use_sparsemax: true
  stability_weight: 0.001

training:
  batch_size: 8
  gradient_accumulation: 16
  learning_rate: 2e-4
  min_lr: 2e-5
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 4000
  max_steps: 500000
  lr_scheduler: cosine
  seq_len: 4096
  amp_dtype: bfloat16

data:
  dataset: slimpajama
  tokenizer: gpt2
  num_workers: 8
