# Resonance Network - Medium (350M params)
# Good for: multi-GPU training, first real chatbot attempt
# VRAM: ~40GB per GPU

model:
  dim: 1024
  n_layers: 24
  num_heads: 16
  max_seq_len: 2048
  coupling_rank: 256
  num_stored_patterns: 512
  hopfield_steps: 1
  mag_expansion: 4
  dropout: 0.1
  dt: 0.1
  use_sparsemax: true
  stability_weight: 0.005

training:
  batch_size: 16
  gradient_accumulation: 8
  learning_rate: 3e-4
  min_lr: 3e-5
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 2000
  max_steps: 200000
  lr_scheduler: cosine
  seq_len: 2048
  amp_dtype: bfloat16

data:
  dataset: slimpajama
  tokenizer: gpt2
  num_workers: 8
