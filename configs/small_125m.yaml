# Resonance Network - Small (125M params)
# Good for: single GPU testing, rapid iteration
# VRAM: ~20GB per GPU

model:
  dim: 768
  n_layers: 12
  num_heads: 12
  max_seq_len: 2048
  coupling_rank: 128
  num_stored_patterns: 256
  hopfield_steps: 1
  mag_expansion: 4
  dropout: 0.1
  dt: 0.1
  use_sparsemax: true
  stability_weight: 0.01

training:
  batch_size: 32          # per GPU
  gradient_accumulation: 4
  learning_rate: 6e-4
  min_lr: 6e-5
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 2000
  max_steps: 100000
  lr_scheduler: cosine
  seq_len: 2048
  amp_dtype: bfloat16

data:
  dataset: slimpajama
  tokenizer: gpt2         # tiktoken gpt2 tokenizer (50257 vocab)
  num_workers: 4
