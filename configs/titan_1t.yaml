# Resonance Network - Titan (1T params)
# Frontier-scale model, needs 256-512+ B200s
# Uses FSDP + tensor parallelism + pipeline parallelism

model:
  dim: 16384
  n_layers: 96
  num_heads: 128
  max_seq_len: 8192
  coupling_rank: 4096
  num_stored_patterns: 8192
  hopfield_steps: 1
  mag_expansion: 4
  dropout: 0.0
  dt: 0.02
  use_sparsemax: false
  stability_weight: 0.0

training:
  batch_size: 1
  gradient_accumulation: 128
  learning_rate: 6e-5
  min_lr: 6e-6
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 4000
  max_steps: 4000000
  lr_scheduler: cosine
  seq_len: 8192
  amp_dtype: bfloat16
  tensor_parallel: 16     # split model across 16 GPUs per node
  pipeline_parallel: 8    # 8 pipeline stages

data:
  dataset: slimpajama
  tokenizer: gpt2
  num_workers: 32
