# Resonance Network - Titan 1T - SFT (Chat Fine-tuning)
# Same architecture, lower LR, shorter schedule
# Resume from pre-trained checkpoint

model:
  dim: 16384
  n_layers: 96
  num_heads: 128
  max_seq_len: 4096
  coupling_rank: 4096
  num_stored_patterns: 8192
  hopfield_steps: 1
  mag_expansion: 4
  dropout: 0.0
  dt: 0.02
  use_sparsemax: false
  stability_weight: 0.0

training:
  batch_size: 1
  gradient_accumulation: 64
  learning_rate: 2e-5
  min_lr: 2e-6
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 500
  max_steps: 50000
  lr_scheduler: cosine
  seq_len: 4096
  amp_dtype: bfloat16

data:
  dataset: sft
  tokenizer: gpt2
  num_workers: 8
